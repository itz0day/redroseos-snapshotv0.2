LABEL arch
TEXT HELP
Boot the RedROSE OS on BIOS.
It allows you to install RedROSE OS or perform system maintenance.
ENDTEXT
MENU LABEL RedROSE OS Live MODE (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID%

# Accessibility boot option
LABEL archspeech
TEXT HELP
Boot the RedROSE OS Live MODE on BIOS with speakup screen reader.
It allows you to install RedROSE OS or perform system maintenance with speech feedback.
ENDTEXT
MENU LABEL RedROSE OS Live MODE (%ARCH%, BIOS) with ^speech
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% accessibility=on
